<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MockForm - 表单测试页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
    .form-container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; }
    input[type="text"], input[type="email"], input[type="password"], select, textarea {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    textarea { height: 80px; resize: vertical; }
    .submit-btn { background: #4a90d9; color: #fff; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; }
    .submit-btn:hover { background: #357abd; }
    #result { display: none; margin-top: 20px; padding: 16px; background: #e8f5e9; border-radius: 4px; }
    #result.show { display: block; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>联系表单</h1>
    <form id="contactForm">
      <div class="form-group">
        <label for="name">姓名</label>
        <input type="text" id="name" name="name" placeholder="请输入姓名" />
      </div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" name="email" placeholder="请输入邮箱" />
      </div>
      <div class="form-group">
        <label for="subject">主题</label>
        <select id="subject" name="subject">
          <option value="">请选择主题</option>
          <option value="general">一般咨询</option>
          <option value="support">技术支持</option>
          <option value="feedback">意见反馈</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">消息内容</label>
        <textarea id="message" name="message" placeholder="请输入消息内容"></textarea>
      </div>
      <button type="submit" class="submit-btn">提交</button>
    </form>
    <div id="result">表单提交成功！感谢您的反馈。</div>
  </div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById("result").classList.add("show");
    });
  </script>
</body>
</html>
